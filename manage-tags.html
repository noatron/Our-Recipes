<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניהול קטגוריות – מפה לפה</title>
    <link rel="icon" href="logo.svg" type="image/svg+xml">
    <link rel="stylesheet" href="style.css">
    <style>
        .manage-tags-wrap { max-width: 560px; margin: 0 auto; padding: 24px; }
        .manage-tags-wrap h1 { color: #407076; margin-bottom: 8px; }
        .manage-tags-wrap .back-link { display: inline-block; margin-bottom: 20px; color: #698996; text-decoration: none; font-size: 0.95rem; }
        .manage-tags-wrap .back-link:hover { color: #407076; }
        .tag-group-box { background: #FFF5EE; border: 2px solid #FFD8BE; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
        .tag-group-box h3 { margin: 0 0 12px 0; font-size: 1.1rem; color: #407076; }
        .tag-list { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
        .tag-item { display: inline-flex; align-items: center; gap: 6px; background: #fff; border: 2px solid #FFD8BE; border-radius: 20px; padding: 6px 10px 6px 14px; font-size: 0.9rem; color: #407076; }
        .tag-item .tag-label { margin-left: 2px; }
        .tag-item button { background: none; border: none; cursor: pointer; padding: 2px 6px; font-size: 1rem; line-height: 1; border-radius: 6px; font-family: inherit; }
        .tag-item button.tag-edit { color: #698996; }
        .tag-item button.tag-edit:hover { color: #407076; background: #f0f7f8; }
        .tag-item button.tag-delete { color: #698996; }
        .tag-item button.tag-delete:hover { color: #c62828; background: #ffebee; }
        .tag-item input.tag-edit-input { width: 80px; min-width: 60px; padding: 2px 6px; border: 1px solid #407076; border-radius: 12px; font-family: inherit; font-size: 0.9rem; color: #407076; outline: none; }
        .add-tag-row { display: flex; gap: 8px; margin-top: 8px; }
        .add-tag-row input { flex: 1; padding: 12px 18px; border: 2px solid #FFD8BE; border-radius: 25px; font-family: 'Varela Round', sans-serif; font-size: 1rem; color: #407076; background: white; outline: none; }
        .add-tag-row input:focus { border-color: #407076; }
        .add-tag-row button { padding: 10px 18px; background: #407076; color: #FFEEDD; border: none; border-radius: 25px; font-family: 'Varela Round', sans-serif; font-size: 1rem; cursor: pointer; }
        .add-tag-row button:hover { background: #698996; }
        .add-quick-row { background: #FFF5EE; border: 2px solid #FFD8BE; border-radius: 12px; padding: 16px; margin-bottom: 20px; }
        .add-quick-row h3 { margin: 0 0 12px 0; font-size: 1rem; color: #407076; }
        .add-quick-row .row { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; align-items: center; }
        .add-quick-row select { padding: 12px 18px; border: 2px solid #FFD8BE; border-radius: 25px; font-family: 'Varela Round', sans-serif; font-size: 1rem; color: #407076; background: white; min-width: 140px; outline: none; }
        .add-quick-row select:focus { border-color: #407076; }
        .add-quick-row input { padding: 12px 18px; border: 2px solid #FFD8BE; border-radius: 25px; font-family: 'Varela Round', sans-serif; font-size: 1rem; color: #407076; background: white; min-width: 120px; outline: none; }
        .add-quick-row input:focus { border-color: #407076; }
        .add-quick-row button { padding: 10px 18px; background: #407076; color: #FFEEDD; border: none; border-radius: 25px; font-family: 'Varela Round', sans-serif; font-size: 1rem; cursor: pointer; }
        .add-quick-row button:hover { background: #698996; }
        .add-group-row { margin-top: 20px; padding-top: 16px; border-top: 2px solid #FFD8BE; }
        .save-bar { position: sticky; bottom: 0; background: #F8F7FF; padding: 16px 0; margin-top: 24px; border-top: 2px solid #FFD8BE; }
        .save-bar button { padding: 12px 24px; background: #407076; color: #FFEEDD; border: none; border-radius: 25px; font-size: 1rem; font-family: 'Varela Round', sans-serif; cursor: pointer; }
        .save-bar button:hover { background: #698996; }
        .save-bar button:disabled { opacity: 0.6; cursor: not-allowed; }
        .status { margin-top: 12px; font-size: 0.9rem; color: #698996; }
        .status.ok { color: #2e7d32; }
        .status.err { color: #c62828; }
    </style>
</head>
<body>
    <div class="manage-tags-wrap">
        <a href="index.html" class="back-link">← חזרה לדף הבית</a>
        <h1>ניהול קטגוריות</h1>
        <p style="color:#698996; margin-bottom:20px;">הוספת קטגוריות כאן תעדכן את האתר: הן יופיעו בסינון ובעריכת מתכונים.</p>

        <div id="authMsg" style="margin-bottom:16px;"></div>

        <div class="add-quick-row">
            <h3>הוספת קטגוריה ותת-קטגוריה</h3>
            <div class="row">
                <label for="quickGroupSelect">קטגוריה (קבוצה):</label>
                <select id="quickGroupSelect"><option value="">בחרי קטגוריה</option></select>
                <input type="text" id="quickSubTag" placeholder="תת-קטגוריה">
                <button type="button" id="addSubTagBtn">הוסיפי תת-קטגוריה</button>
            </div>
            <div class="row" style="margin-top:12px;">
                <input type="text" id="quickNewGroup" placeholder="קטגוריה חדשה (קבוצה)">
                <input type="text" id="quickNewSubTag" placeholder="תת-קטגוריה ראשונה (אופציונלי)">
                <button type="button" id="addGroupWithSubBtn">הוסיפי קטגוריה (+ תת-קטגוריה)</button>
            </div>
        </div>

        <div id="tagGroupsContainer"></div>
        <div class="add-group-row">
            <h3 style="margin:0 0 8px 0; font-size:1rem; color:#407076;">קבוצה חדשה</h3>
            <div class="add-tag-row">
                <input type="text" id="newGroupName" placeholder="שם הקבוצה">
                <button type="button" id="addGroupBtn">הוסיפי קבוצה</button>
            </div>
        </div>
        <div class="save-bar">
            <button type="button" id="saveBtn">שמירה</button>
            <span id="status" class="status"></span>
        </div>
    </div>

    <script type="module">
        import { db, auth, onUserChange, signInWithGoogle } from './firebase.js';
        import { doc, getDoc, setDoc, collection, getDocs, updateDoc } from 'https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js';

        const CONFIG_PATH = { collection: 'config', id: 'tags' };
        const DEFAULT_GROUPS = [
            { label: 'מנות עיקריות', tags: ['בשר', 'דגים', 'פסטות', 'קישים ופשטידות', 'צמחוני'] },
            { label: 'סלטים', tags: ['סלטים'] },
            { label: 'תוספות', tags: ['תוספות'] },
            { label: 'לחם ומאפים', tags: ['לחם ומאפים'] },
            { label: 'רטבים וממרחים', tags: ['רטבים וממרחים'] },
            { label: 'מרקים', tags: ['מרקים'] },
            { label: 'קינוחים', tags: ['עוגות', 'עוגיות', 'קינוחים', 'שוקולד'] },
            { label: 'ארוחות בוקר', tags: ['ארוחות בוקר'] },
            { label: 'חטיפים', tags: ['חטיפים'] },
            { label: 'שתייה', tags: ['שתייה'] }
        ];

        let tagGroups = [];
        /** עקבות שינויי שמות לתגיות – לעדכון מתכונים בשמירה */
        let tagRenames = [];
        const container = document.getElementById('tagGroupsContainer');
        const saveBtn = document.getElementById('saveBtn');
        const statusEl = document.getElementById('status');
        const authMsg = document.getElementById('authMsg');

        function flattenTags(groups) {
            return groups.reduce((arr, g) => arr.concat(g.tags || []), []);
        }

        function render() {
            container.innerHTML = tagGroups.map((group, gIdx) => `
                <div class="tag-group-box" data-group-idx="${gIdx}">
                    <h3>${escapeHtml(group.label)}</h3>
                    <div class="tag-list">${(group.tags || []).map((tag, tIdx) => `
                        <span class="tag-item" data-group-idx="${gIdx}" data-tag-idx="${tIdx}">
                            <span class="tag-label">${escapeHtml(tag)}</span>
                            <button type="button" class="tag-edit" data-group-idx="${gIdx}" data-tag-idx="${tIdx}" aria-label="ערוך" title="ערוך">✎</button>
                            <button type="button" class="tag-delete" data-group-idx="${gIdx}" data-tag-idx="${tIdx}" aria-label="מחק תגית" title="מחק תגית">מחק</button>
                        </span>
                    `).join('')}</div>
                    <div class="add-tag-row">
                        <input type="text" data-group-idx="${gIdx}" placeholder="קטגוריה חדשה בקבוצה זו">
                        <button type="button" data-group-idx="${gIdx}" class="add-tag-btn">הוסיפי</button>
                    </div>
                </div>
            `).join('');

            container.querySelectorAll('.tag-delete').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    const gIdx = parseInt(btn.dataset.groupIdx, 10);
                    const tIdx = parseInt(btn.dataset.tagIdx, 10);
                    if (!tagGroups[gIdx] || !Array.isArray(tagGroups[gIdx].tags)) return;
                    tagGroups[gIdx].tags.splice(tIdx, 1);
                    render();
                });
            });

            container.querySelectorAll('.tag-edit').forEach(btn => {
                btn.addEventListener('click', () => {
                    const gIdx = parseInt(btn.dataset.groupIdx, 10);
                    const tIdx = parseInt(btn.dataset.tagIdx, 10);
                    const tag = tagGroups[gIdx].tags[tIdx];
                    const item = container.querySelector(`.tag-item[data-group-idx="${gIdx}"][data-tag-idx="${tIdx}"]`);
                    const labelEl = item.querySelector('.tag-label');
                    const input = document.createElement('input');
                    input.type = 'text';
                    input.className = 'tag-edit-input';
                    input.value = tag;
                    input.setAttribute('data-group-idx', gIdx);
                    input.setAttribute('data-tag-idx', tIdx);
                    const finishEdit = () => {
                        const newVal = (input.value || '').trim();
                        if (newVal && newVal !== tag) {
                            tagGroups[gIdx].tags[tIdx] = newVal;
                            tagRenames.push({ old: tag, new: newVal });
                        }
                        render();
                    };
                    input.addEventListener('blur', finishEdit);
                    input.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); input.blur(); } });
                    labelEl.replaceWith(input);
                    input.focus();
                });
            });
            container.querySelectorAll('.add-tag-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const gIdx = parseInt(btn.dataset.groupIdx, 10);
                    const input = container.querySelector(`.add-tag-row input[data-group-idx="${gIdx}"]`);
                    const val = (input.value || '').trim();
                    if (!val) return;
                    if (!tagGroups[gIdx].tags) tagGroups[gIdx].tags = [];
                    if (tagGroups[gIdx].tags.includes(val)) { input.value = ''; return; }
                    tagGroups[gIdx].tags.push(val);
                    input.value = '';
                    render();
                });
            });
            fillQuickGroupSelect();
        }

        function fillQuickGroupSelect() {
            const sel = document.getElementById('quickGroupSelect');
            if (!sel) return;
            sel.innerHTML = '<option value="">בחרי קטגוריה</option>';
            tagGroups.forEach((g, i) => sel.appendChild(new Option(g.label, String(i))));
        }

        function escapeHtml(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        async function load() {
            tagRenames = [];
            try {
                const snap = await getDoc(doc(db, CONFIG_PATH.collection, CONFIG_PATH.id));
                if (snap.exists() && Array.isArray(snap.data().tagGroups) && snap.data().tagGroups.length) {
                    tagGroups = snap.data().tagGroups.map(g => ({ label: g.label, tags: [...(g.tags || [])] }));
                } else {
                    tagGroups = DEFAULT_GROUPS.map(g => ({ label: g.label, tags: [...g.tags] }));
                }
                render();
            } catch (e) {
                statusEl.textContent = 'שגיאה בטעינה: ' + (e.message || e);
                statusEl.className = 'status err';
                tagGroups = DEFAULT_GROUPS.map(g => ({ label: g.label, tags: [...g.tags] }));
                render();
            }
        }

        saveBtn.addEventListener('click', async () => {
            if (!auth.currentUser) {
                statusEl.textContent = 'צריך להתחבר כדי לשמור.';
                statusEl.className = 'status err';
                return;
            }
            saveBtn.disabled = true;
            statusEl.textContent = 'שומר...';
            statusEl.className = 'status';
            try {
                const allTags = flattenTags(tagGroups);
                const currentTagSet = new Set(allTags);
                const renamesMap = {};
                tagRenames.forEach(({ old: o, new: n }) => { renamesMap[o] = n; });

                await setDoc(doc(db, CONFIG_PATH.collection, CONFIG_PATH.id), { tagGroups, allTags });

                const snapshot = await getDocs(collection(db, 'recipes'));
                let updated = 0;
                for (const d of snapshot.docs) {
                    const data = d.data();
                    const tags = Array.isArray(data.tags) ? data.tags : [];
                    const newTags = tags
                        .map(t => renamesMap[t] !== undefined ? renamesMap[t] : t)
                        .filter(t => currentTagSet.has(t));
                    const same = newTags.length === tags.length && newTags.every((t, i) => t === tags[i]);
                    if (!same) {
                        await updateDoc(doc(db, 'recipes', d.id), { tags: newTags });
                        updated++;
                    }
                }

                tagRenames = [];
                statusEl.textContent = updated > 0
                    ? `נשמר. עודכנו ${updated} מתכונים עם התגיות החדשות.`
                    : 'נשמר. הקטגוריות מתעדכנות באתר.';
                statusEl.className = 'status ok';
            } catch (e) {
                statusEl.textContent = 'שגיאה: ' + (e.message || e);
                statusEl.className = 'status err';
            }
            saveBtn.disabled = false;
        });

        document.getElementById('addGroupBtn').addEventListener('click', () => {
            const input = document.getElementById('newGroupName');
            const name = (input.value || '').trim();
            if (!name) return;
            tagGroups.push({ label: name, tags: [] });
            input.value = '';
            render();
        });

        document.getElementById('addSubTagBtn').addEventListener('click', () => {
            const sel = document.getElementById('quickGroupSelect');
            const subInput = document.getElementById('quickSubTag');
            const gIdx = sel.value === '' ? -1 : parseInt(sel.value, 10);
            const val = (subInput.value || '').trim();
            if (gIdx < 0 || !val) return;
            if (!tagGroups[gIdx].tags) tagGroups[gIdx].tags = [];
            if (tagGroups[gIdx].tags.includes(val)) { subInput.value = ''; return; }
            tagGroups[gIdx].tags.push(val);
            subInput.value = '';
            render();
        });

        document.getElementById('addGroupWithSubBtn').addEventListener('click', () => {
            const groupInput = document.getElementById('quickNewGroup');
            const subInput = document.getElementById('quickNewSubTag');
            const groupName = (groupInput.value || '').trim();
            const subTag = (subInput.value || '').trim();
            if (!groupName) return;
            const tags = subTag ? [subTag] : [];
            tagGroups.push({ label: groupName, tags });
            groupInput.value = '';
            subInput.value = '';
            render();
        });

        onUserChange((user) => {
            if (user) {
                authMsg.innerHTML = '';
                load();
            } else {
                authMsg.innerHTML = 'מחוברת? <button type="button" id="signInTagsBtn" style="padding:6px 12px;background:#407076;color:white;border:none;border-radius:6px;cursor:pointer;">התחברי עם Google</button>';
                document.getElementById('signInTagsBtn')?.addEventListener('click', () => signInWithGoogle());
                load();
            }
        });

        if (auth.currentUser) load();
        else onUserChange(auth.currentUser);
    </script>
</body>
</html>
